<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-1: #926418; --gold-2: #9d7128; --gold-3: #ba9552;
    --gold-4: #c39043; --gold-5: #e9cf95; --gold-6: #edd49b;
    --silver-1: #8f8e8d; --silver-2: #9e9e9d; --silver-3: #c8c7c6; --silver-4: #e2e2e2;
    --dark-1: #070708;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: var(--dark-1);
    color: var(--silver-4);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  /* ══════════════════════════════════════════
     Z-INDEX MAP
     0  bg-media (video)
     1  dot-matrix overlay
     2  bg-grid svg
     3  grain
     4  vignette
     5  mouse-gradient
     6  floating-dots
     7  bg ghost text
     8  gold lines + corners
     9  ripples
     10 content
  ══════════════════════════════════════════ */

  /* ── CAMADA 0: VÍDEO ─────────────────────── */
  .bg-media {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
  }
  .bg-media video {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    /* opacidade do vídeo — sutil mas presente */
    opacity: 0.18;
    filter: grayscale(75%) contrast(1.05) brightness(0.9);
    transform: scale(1.05);
    animation: subtle-zoom 35s ease-in-out infinite alternate;
  }
  @keyframes subtle-zoom {
    from { transform: scale(1.05); }
    to   { transform: scale(1.14); }
  }

  /* ── CAMADA 1: DOT MATRIX OVERLAY ───────────
     Tela de pontinhos pequenos alinhados que
     perfuram a imagem, reduzindo os "pixels
     de exibição" visíveis do vídeo.
  ────────────────────────────────────────── */
  .dot-matrix {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    /* Padrão radial: ponto escuro + espaço transparente
       dot size 1px, grid 3x3px — denso e fino */
    background-image: radial-gradient(
      circle,
      rgba(7,7,8,0.82) 1px,
      transparent 1px
    );
    background-size: 3px 3px;
    /* Leve variação para não ficar mecânico */
    opacity: 0.88;
  }

  /* ── CAMADA 2: GRID SVG ANIMADO ─────────── */
  .bg-grid-svg {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none; overflow: hidden;
  }
  @keyframes grid-draw {
    0%   { stroke-dashoffset: 1000; opacity: 0; }
    50%  { opacity: 0.2; }
    100% { stroke-dashoffset: 0; opacity: 0.12; }
  }
  .grid-line {
    stroke: rgba(195,144,67,0.35);
    stroke-width: 0.5; opacity: 0;
    stroke-dasharray: 6 6; stroke-dashoffset: 1000;
    animation: grid-draw 2.5s ease-out forwards;
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50%       { opacity: 0.45; transform: scale(1.2); }
  }
  .detail-dot {
    fill: var(--gold-4); opacity: 0;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  /* ── CAMADA 3: GRAIN ─────────────────────── */
  .grain {
    position: fixed; inset: 0; z-index: 3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035; pointer-events: none;
  }

  /* ── CAMADA 4: VINHETA ───────────────────── */
  .vignette {
    position: fixed; inset: 0; z-index: 4;
    background:
      radial-gradient(ellipse 80% 70% at 50% 50%, transparent 20%, rgba(7,7,8,0.78) 100%),
      linear-gradient(to bottom, rgba(7,7,8,0.6) 0%, transparent 22%, transparent 78%, rgba(7,7,8,0.72) 100%);
    pointer-events: none;
  }

  /* ── CAMADA 5: MOUSE GRADIENT ───────────── */
  #mouse-gradient {
    position: fixed; pointer-events: none; border-radius: 9999px;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(195,144,67,0.045), rgba(195,144,67,0.02), transparent 70%);
    transform: translate(-50%, -50%);
    transition: left 80ms linear, top 80ms linear, opacity 300ms ease-out;
    z-index: 5; opacity: 0;
  }

  /* ── CAMADA 6: FLOATING DOTS ─────────────── */
  @keyframes float-dot {
    0%, 100% { transform: translateY(0) translateX(0);        opacity: 0.15; }
    25%       { transform: translateY(-12px) translateX(6px);  opacity: 0.5; }
    50%       { transform: translateY(-6px) translateX(-4px);  opacity: 0.3; }
    75%       { transform: translateY(-18px) translateX(8px);  opacity: 0.65; }
  }
  .floating-dot {
    position: fixed; width: 2px; height: 2px;
    background: var(--gold-4); border-radius: 50%;
    opacity: 0; animation: float-dot 5s ease-in-out infinite;
    z-index: 6; pointer-events: none;
  }

  /* ── CAMADA 7: TEXTO FANTASMA ────────────── */
  .bg-text-wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 7; overflow: hidden;
    user-select: none; pointer-events: none;
  }
  .bg-word {
    font-family: 'Saira Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(9vw, 18vw, 22vw);
    line-height: 0.88; letter-spacing: -0.02em;
    color: transparent;
    -webkit-text-stroke: 1px rgba(180,160,100,0.07);
    white-space: nowrap;
    animation: bg-pulse 8s ease-in-out infinite;
  }
  .bg-word:nth-child(2) {
    animation-delay: -4s;
    color: rgba(180,160,100,0.03);
    -webkit-text-stroke: 1px rgba(180,160,100,0.045);
  }
  @keyframes bg-pulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.015); }
  }

  /* ── CAMADA 8: LINHAS + CORNERS ──────────── */
  .line-v {
    position: fixed; top: 0; left: 50%;
    width: 1px; height: 100%;
    background: linear-gradient(to bottom,
      transparent 0%, rgba(195,144,67,0.12) 15%,
      rgba(195,144,67,0.5) 50%, rgba(195,144,67,0.12) 85%, transparent 100%);
    transform: translateX(-50%); z-index: 8;
    animation: line-breathe 4s ease-in-out infinite;
  }
  @keyframes line-breathe { 0%,100% { opacity:0.7; } 50% { opacity:1; } }

  .line-h-top, .line-h-bottom {
    position: fixed; left: 0; right: 0; height: 1px; z-index: 8;
    background: linear-gradient(to right, transparent, rgba(195,144,67,0.28) 30%, rgba(195,144,67,0.55) 50%, rgba(195,144,67,0.28) 70%, transparent);
    opacity: 0; transform-origin: center;
    animation: h-line-in 1.8s ease forwards;
  }
  .line-h-top    { top: 10%; }
  .line-h-bottom { bottom: 10%; animation-duration: 2.2s; }
  @keyframes h-line-in {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }

  .corner {
    position: fixed; width: 44px; height: 44px;
    z-index: 8; opacity: 0;
    animation: corner-in 2s ease forwards 1.2s;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 24px; left: 24px; }
  .corner-tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner-bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner-br { bottom: 24px; right: 24px; transform: scale(-1); }
  @keyframes corner-in { from { opacity:0; } to { opacity:1; } }

  /* ── CAMADA 9: RIPPLE ────────────────────── */
  .ripple-effect {
    position: fixed; width: 6px; height: 6px;
    border-radius: 50%; transform: translate(-50%, -50%);
    pointer-events: none; z-index: 9;
    background: rgba(195,144,67,0.7);
    animation: ripple-out 0.9s ease-out forwards;
  }
  @keyframes ripple-out {
    0%   { opacity: 0.8; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(18); }
  }

  /* ══════════════════════════════════════════
     CAMADA 10: CONTEÚDO
  ══════════════════════════════════════════ */
  .main {
    position: relative; z-index: 10;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px 24px 60px;
  }


  /* ── LOGO RESPONSIVO ─────────────────────────────
     Desktop: logo horizontal | Mobile: logo vertical */
  }
  }


  /* ── REDES SOCIAIS ──────────────────────────────── */
  .social-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 36px 0 0;
    width: 100%;
    opacity: 0;
    animation: fade-up 1s ease forwards 2.2s;
  }

  .social-links {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border: 1px solid rgba(195,144,67,0.25);
    background: rgba(7,7,8,0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    text-decoration: none;
    color: rgba(195,144,67,0.7);
    transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease, transform 0.25s ease;
    position: relative;
  }

  .social-btn::before, .social-btn::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    border-color: var(--gold-4);
    border-style: solid;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .social-btn::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .social-btn::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  .social-btn:hover {
    border-color: rgba(195,144,67,0.7);
    color: var(--gold-5);
    background: rgba(195,144,67,0.08);
    transform: translateY(-3px);
  }
  .social-btn:hover::before,
  .social-btn:hover::after {
    opacity: 1;
  }

  .social-btn svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .social-divider {
    width: 1px; height: 20px;
    background: linear-gradient(to bottom, transparent, rgba(195,144,67,0.3), transparent);
  }

  .bottom-credits {
    position: fixed;
    bottom: 3%;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    animation: fade-up 1s ease forwards 2.5s;
  }

  .bottom-text {
    font-family: 'Rajdhani', sans-serif; font-weight: 400;
    font-size: clamp(10px, 1.4vw, 12px); letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(180,160,100,0.4);
  }
  .bottom-dot { width:3px; height:3px; border-radius:50%; background:var(--gold-4); opacity:0.3; }

  @media (max-width: 600px) {
    .social-bar { gap: 10px; padding: 0 16px 20px; }
    .social-btn { width: 38px; height: 38px; }
    .social-btn svg { width: 17px; height: 17px; }
  }

  @media (max-width: 600px) {
    }
    }
  }

  /* Logo wrap */
  .logo-wrap {
    opacity: 0; transform: translateY(-20px);
    animation: fade-down 1.2s cubic-bezier(0.22,1,0.36,1) forwards 0.3s;
    width: 100%; display: flex; justify-content: center;
  }
  @keyframes fade-down { to { opacity:1; transform:translateY(0); } }

  .sep {
    display: flex; align-items: center; gap: 16px;
    width: 100%; max-width: 480px;
    margin: 30px auto 24px; opacity: 0;
    animation: fade-up 1s ease forwards 0.9s;
  }
  .sep-line { flex: 1; height: 1px; }
  .sep-line:first-child { background: linear-gradient(to right, transparent, var(--gold-4)); }
  .sep-line:last-child  { background: linear-gradient(to left,  transparent, var(--gold-4)); }
  .sep-diamond {
    width: 6px; height: 6px; background: var(--gold-4);
    transform: rotate(45deg); flex-shrink: 0;
  }

  /* Word appear */
  @keyframes word-appear {
    0%   { opacity:0; transform:translateY(28px) scale(0.82); filter:blur(7px); }
    55%  { opacity:0.85; transform:translateY(7px) scale(0.97); filter:blur(1px); }
    100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
  }
  .word-reveal {
    display: inline-block; opacity: 0;
    animation: word-appear 0.75s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  .headline { text-align: center; }

  .hl-eyebrow {
    font-family: 'Saira Condensed', sans-serif;
    font-weight: 200; font-size: clamp(11px, 2vw, 13px);
    letter-spacing: 0.5em; text-transform: uppercase;
    color: var(--gold-4); display: block; margin-bottom: 6px;
  }
  .hl-main {
    font-family: 'Saira Condensed', sans-serif;
    font-weight: 700; font-size: clamp(34px, 6.5vw, 68px);
    letter-spacing: 0.08em; text-transform: uppercase; line-height: 1;
    background: linear-gradient(135deg, var(--silver-1) 0%, var(--silver-4) 40%, #fff 50%, var(--silver-3) 60%, var(--silver-1) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; display: block; margin-bottom: 2px;
  }
  .hl-outline {
    font-family: 'Saira Condensed', sans-serif;
    font-weight: 700; font-size: clamp(34px, 6.5vw, 68px);
    letter-spacing: 0.08em; text-transform: uppercase; line-height: 1;
    color: transparent; -webkit-text-stroke: 1px rgba(195,144,67,0.45);
    display: block; margin-bottom: 12px; position: relative;
  }
  .hl-outline::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(195,144,67,0.6), transparent);
    animation: underline-grow 2s ease-out forwards; animation-delay: 2.2s;
  }
  @keyframes underline-grow { to { width: 100%; } }

  .hl-sub {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300; font-size: clamp(11px, 1.8vw, 14px);
    letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(200,199,198,0.45); display: block;
  }

  .countdown-wrap {
    margin-top: 36px; display: flex;
    gap: clamp(10px, 3vw, 32px); opacity: 0;
    animation: fade-up 1s ease forwards 1.6s;
  }
  .cd-unit {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px; position: relative;
  }
  .cd-unit + .cd-unit::before {
    content: ':';
    position: absolute;
    left: calc(-0.5 * clamp(10px, 3vw, 32px) - 8px);
    top: 6px;
    font-family: 'Saira Condensed', sans-serif; font-weight: 300;
    font-size: clamp(22px, 3.5vw, 40px);
    color: var(--gold-4); opacity: 0.5; line-height: 1;
  }
  .cd-box {
    position: relative;
    border: 1px solid rgba(195,144,67,0.2);
    background: rgba(7,7,8,0.5);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: clamp(10px,1.5vw,16px) clamp(14px,2.5vw,24px);
    transition: border-color 0.3s ease;
  }
  .cd-box:hover { border-color: rgba(195,144,67,0.45); }
  .cd-box::before, .cd-box::after {
    content: ''; position: absolute;
    width: 6px; height: 6px;
    border-color: var(--gold-4); border-style: solid; opacity: 0.5;
  }
  .cd-box::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
  .cd-box::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
  .cd-number {
    font-family: 'Saira Condensed', sans-serif; font-weight: 700;
    font-size: clamp(36px, 5.5vw, 64px); line-height: 1;
    background: linear-gradient(180deg, #fff 0%, var(--silver-3) 55%, var(--silver-1) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: clamp(44px, 6vw, 72px); text-align: center; display: block;
  }
  .cd-label {
    font-family: 'Rajdhani', sans-serif; font-weight: 400;
    font-size: clamp(9px, 1.1vw, 11px); letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--gold-4); opacity: 0.75;
  }

  .bottom-msg-legacy {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 10; display: flex; justify-content: center;
    padding: 0 24px 28px; opacity: 0;
    animation: fade-up 1s ease forwards 2s;
  }
  .bottom-inner {
    display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap; justify-content: center;
  }
  .bottom-text {
    font-family: 'Rajdhani', sans-serif; font-weight: 400;
    font-size: clamp(10px, 1.4vw, 12px); letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(180,160,100,0.45);
  }
  .bottom-dot { width:3px; height:3px; border-radius:50%; background:var(--gold-4); opacity:0.35; }

  @keyframes fade-up {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media (max-width: 600px) {
    .corner { width:30px; height:30px; }
    .corner-tl { top:14px; left:14px; } .corner-tr { top:14px; right:14px; }
    .corner-bl { bottom:14px; left:14px; } .corner-br { bottom:14px; right:14px; }
    .line-h-top { top:6%; } .line-h-bottom { bottom:6%; }
  }
  @media (max-height: 600px) {
    .main { padding:36px 24px; }
    .sep { margin:12px auto 10px; }
    .countdown-wrap { margin-top:16px; }
  }
</style>
</head>
<body>

<!-- CAMADA 0: VÍDEO EMBEDDED (base64, funciona offline) -->
